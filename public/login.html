<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Falcons Office</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

<div class="login-box">

<div class="logo-area">
<h1>Falcons</h1>
<p>Private Secure Messaging</p>
</div>

<div class="input-group">
<input type="text" id="username" placeholder="اسم المستخدم">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="كلمة المرور">
</div>

<button id="mainBtn" class="login-btn" onclick="submitForm()">
تسجيل الدخول
</button>

<p class="switch-mode">
<span id="switchText">ليس لديك حساب؟</span>
<a href="#" onclick="toggleMode()" id="switchBtn">
إنشاء حساب
</a>
</p>

</div>

<script>

let isLogin = true;

function toggleMode(){

  isLogin = !isLogin;

  document.getElementById('mainBtn').innerText =
  isLogin ? 'تسجيل الدخول' : 'إنشاء حساب';

  document.getElementById('switchText').innerText =
  isLogin ? 'ليس لديك حساب؟' : 'لديك حساب بالفعل؟';

  document.getElementById('switchBtn').innerText =
  isLogin ? 'إنشاء حساب' : 'تسجيل الدخول';

}

async function submitForm(){

  const username =
  document.getElementById('username').value;

  const password =
  document.getElementById('password').value;

  if(!username || !password){
    alert('املأ جميع الحقول');
    return;
  }

  const endpoint =
  isLogin
  ? '/api/login'
  : '/api/register';

  const res = await fetch(endpoint,{
    method:'POST',
    headers:{
      'Content-Type':'application/json'
    },
    body:JSON.stringify({
      username,
      password
    })
  });

  const data = await res.json();

  if(!data.success){
    alert(data.message || data.error);
    return;
  }

  if(!isLogin){
    alert('تم إنشاء الحساب');
    toggleMode();
    return;
  }

  localStorage.setItem(
    'token',
    data.token
  );
  console.log(data.token);

  localStorage.setItem(
    'user',
    JSON.stringify(data.user)
  );

  window.location.href='/dashboard.html';

}

</script>

</body>
</html>
