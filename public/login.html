```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Falcons Office</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body class="login-page">

  <div class="login-box">

    <div class="logo">

      <h1>Falcons</h1>

      <p>
        Private Secure Messaging
      </p>

    </div>

    <div class="input-group">

      <input
        type="text"
        id="username"
        placeholder="اسم المستخدم"
      />

    </div>

    <div class="input-group">

      <input
        type="password"
        id="password"
        placeholder="كلمة المرور"
      />

    </div>

    <button
      class="login-btn"
      onclick="login()"
    >
      دخول
    </button>

    <button
      class="register-btn"
      onclick="register()"
      style="
        margin-top:10px;
        width:100%;
        padding:15px;
        border:none;
        border-radius:12px;
        cursor:pointer;
      "
    >
      إنشاء حساب
    </button>

  </div>

  <script>

    const API = '/api';

    // ===== LOGIN =====

    async function login() {

      const username =
        document.getElementById(
          'username'
        ).value;

      const password =
        document.getElementById(
          'password'
        ).value;

      const res = await fetch(
        `${API}/login`,
        {

          method: 'POST',

          headers: {
            'Content-Type':
              'application/json'
          },

          body: JSON.stringify({
            username,
            password
          })

        }
      );

      const data =
        await res.json();

      if (data.token) {

        localStorage.setItem(
          'token',
          data.token
        );

        localStorage.setItem(
          'username',
          username
        );

        window.location =
          'dashboard.html';

      } else {

        alert(
          data.error ||
          'Login failed'
        );

      }

    }

    // ===== REGISTER =====

    async function register() {

      const username =
        document.getElementById(
          'username'
        ).value;

      const password =
        document.getElementById(
          'password'
        ).value;

      const res = await fetch(
        `${API}/register`,
        {

          method: 'POST',

          headers: {
            'Content-Type':
              'application/json'
          },

          body: JSON.stringify({
            username,
            password
          })

        }
      );

      const data =
        await res.json();

      if (data.success) {

        alert('تم إنشاء الحساب');

      } else {

        alert(
          data.error ||
          'Register failed'
        );

      }

    }

  </script>

</body>
</html>
