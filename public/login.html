
<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falcons Office</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

  <div class="login-box">

    <h1>Falcons</h1>
    <p>Private Secure Messaging</p>

    <input
      type="text"
      id="username"
      placeholder="اسم المستخدم"
    >

    <input
      type="password"
      id="password"
      placeholder="كلمة المرور"
    >

    <button onclick="login()">
      دخول
    </button>

    <button
      onclick="register()"
      style="
      margin-top:10px;
      background:#111;
      color:white;
      border:1px solid #00ff99;
      "
    >
      إنشاء حساب
    </button>

  </div>

  <script>

    const API = '/api';

    async function login() {

      const username =
        document.getElementById('username').value;

      const password =
        document.getElementById('password').value;

      if (!username || !password) {
        alert('املأ جميع الحقول');
        return;
      }

      try {

        const res = await fetch(`${API}/login`, {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            username,
            password
          })

        });

        const data = await res.json();

        if (data.success) {

          localStorage.setItem(
            'userId',
            data.id
          );

          localStorage.setItem(
            'username',
            data.username
          );

          window.location.href =
            'dashboard.html';

        } else {

          alert(
            data.message ||
            'فشل تسجيل الدخول'
          );

        }

      } catch (error) {

        console.log(error);

        alert('Server Error');

      }

    }



    async function register() {

      const username =
        document.getElementById('username').value;

      const password =
        document.getElementById('password').value;

      if (!username || !password) {

        alert('املأ جميع الحقول');
        return;

      }

      try {

        const res = await fetch(`${API}/register`, {

          method: 'POST',

          headers: {
            'Content-Type': 'application/json'
          },

          body: JSON.stringify({
            username,
            password
          })

        });

        const data = await res.json();

        if (data.success) {

          alert('تم إنشاء الحساب');

        } else {

          alert(
            data.message ||
            'فشل إنشاء الحساب'
          );

        }

      } catch (error) {

        console.log(error);

        alert('Server Error');

      }

    }

  </script>

</body>

</html>
