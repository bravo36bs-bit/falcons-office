
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Falcons Office</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login-page">

<div class="login-box">

    <h1 class="logo">Falcons</h1>
    <p class="subtitle">Private Secure Messaging</p>

    <input
        type="text"
        id="username"
        placeholder="Username"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button id="mainBtn" onclick="submitForm()">
        Login
    </button>

    <p class="switch-mode">
        <span id="switchText">
            Don't have an account?
        </span>

        <a href="#" onclick="toggleMode()"
           id="switchBtn">
           Create Account
        </a>
    </p>

</div>

<script>

const API = '';

let isLogin = true;

function toggleMode() {

    isLogin = !isLogin;

    const btn = document.getElementById('mainBtn');
    const switchText = document.getElementById('switchText');
    const switchBtn = document.getElementById('switchBtn');

    if (isLogin) {

        btn.innerText = 'Login';

        switchText.innerText =
            "Don't have an account?";

        switchBtn.innerText =
            'Create Account';

    } else {

        btn.innerText = 'Create Account';

        switchText.innerText =
            'Already have an account?';

        switchBtn.innerText =
            'Login';

    }
}

async function submitForm() {

    const username =
        document.getElementById('username').value;

    const password =
        document.getElementById('password').value;

    if (!username || !password) {

        alert('Fill all fields');

        return;
    }

    try {

        const endpoint =
            isLogin
            ? '/api/login'
            : '/api/register';

        const res = await fetch(endpoint, {

            method: 'POST',

            headers: {
                'Content-Type': 'application/json'
            },

            body: JSON.stringify({
                username,
                password
            })
        });

        const data = await res.json();

        if (!data.success) {

            alert(
                data.message ||
                data.error ||
                'Request failed'
            );

            return;
        }

        if (!isLogin) {

            alert('Account created successfully');

            toggleMode();

            return;
        }

        localStorage.setItem(
            'token',
            data.token
        );

        localStorage.setItem(
            'user',
            JSON.stringify(data.user)
        );

        window.location.href =
            '/dashboard.html';

    } catch (err) {

        console.log(err);

        alert('Server error');

    }
}

</script>

</body>
</html>
