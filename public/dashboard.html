<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Falcons Office</title>
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>
</head>

<body>

<div class="dashboard">

<div class="sidebar">

<div class="brand">
<h2>Falcons Office</h2>
</div>

<div class="search-box">
<input type="text" id="friendName" placeholder="إضافة صديق">
</div>

<div style="padding:0 18px 18px;">
<button class="login-btn" onclick="addFriend()">
إرسال طلب
</button>
</div>

<div class="friend-list" id="friends"></div>

<div class="requests">
<h3>طلبات الصداقة</h3>
<div id="requests"></div>
</div>

</div>

<div class="chat-area">

<div class="chat-header" id="chatHeader">
اختر صديق
</div>

<div class="chat-messages" id="messages"></div>

<div class="chat-input">

<input
type="text"
id="messageInput"
placeholder="اكتب رسالة..."
>

<input
type="file"
id="fileInput"
hidden
>

<button onclick="document.getElementById('fileInput').click()">
📎
</button>

<button onclick="sendMessage()">
➤
</button>

</div>

</div>

</div>

<script>

const token = localStorage.getItem('token');

if(!token){
  window.location='login.html';
}

const currentUser =
JSON.parse(localStorage.getItem('user'));

const socket = io({
  auth:{token}
});

let selectedFriend = null;

async function api(endpoint, options={}){

  const res = await fetch(endpoint,{

    ...options,

    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${token}`
    }

  });

  return await res.json();

}

async function loadFriends(){

  const friends = await api('/api/friends');

  const container =
  document.getElementById('friends');

  container.innerHTML='';

  friends.forEach(friend=>{

    const div =
    document.createElement('div');

    div.className='friend';

    div.innerHTML=`
    <div class="avatar">
    ${friend.username[0]}
    </div>

    <div class="friend-info">
      <h4>${friend.username}</h4>
      <span>
      ${friend.is_online ? 'Online':'Offline'}
      </span>
    </div>
    `;

    div.onclick=()=>{

      selectedFriend = friend;

      document.getElementById('chatHeader').innerHTML=`
      <div class="avatar">
      ${friend.username[0]}
      </div>
      <div>${friend.username}</div>
      `;

      loadMessages(friend.id);

    };

    container.appendChild(div);

  });

}

async function loadMessages(friendId){

  const messages =
  await api(`/api/messages/${friendId}`);

  const container =
  document.getElementById('messages');

  container.innerHTML='';

  messages.forEach(renderMessage);

}

function renderMessage(msg){

  const container =
  document.getElementById('messages');

  const div =
  document.createElement('div');

  div.className =
  `message ${
    msg.sender_id == currentUser.id
    ? 'sent'
    : 'received'
  }`;

  div.innerText = msg.message;

  container.appendChild(div);

  container.scrollTop =
  container.scrollHeight;

}

function sendMessage(){

  const input =
  document.getElementById('messageInput');

  const message =
  input.value.trim();

  if(!message || !selectedFriend){
    return;
  }

  socket.emit('send_message',{

    receiver_id:selectedFriend.id,
    message

  });

  input.value='';

}

async function addFriend(){

  const friendName =
  document.getElementById('friendName').value;

  const data =
  await api('/api/send-request',{

    method:'POST',

    body:JSON.stringify({
      friendName
    })

  });

  if(data.success){
    alert('تم إرسال طلب الصداقة');
  }else{
    alert(data.error);
  }

}

async function loadRequests(){

  const requests =
  await api('/api/friend-requests');

  const container =
  document.getElementById('requests');

  container.innerHTML='';

  requests.forEach(req=>{

    const div =
    document.createElement('div');

    div.className='request-item';

    div.innerHTML=`
    <span>${req.username}</span>

    <button onclick="acceptRequest(${req.id})">
    قبول
    </button>
    `;

    container.appendChild(div);

  });

}

async function acceptRequest(id){

  const data =
  await api('/api/accept-request',{

    method:'POST',

    body:JSON.stringify({
      requestId:id
    })

  });

  if(data.success){
    loadFriends();
    loadRequests();
  }

}

socket.on('receive_message', data=>{

  if(
    selectedFriend &&
    (
      data.sender_id == selectedFriend.id ||
      data.receiver_id == selectedFriend.id
    )
  ){
    renderMessage(data);
  }

});

socket.on('status_update',()=>{
  loadFriends();
});

socket.on('friends_updated',()=>{
  loadFriends();
  loadRequests();
});

loadFriends();
loadRequests();

</script>

</body>
</html>
